<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1e3a5f"/>
  <g transform="translate(256, 256)">
    <!-- Building outline -->
    <rect x="-130" y="-150" width="260" height="280" rx="12" fill="#0056D2" stroke="#ffffff" stroke-width="8"/>
    <!-- Roof -->
    <rect x="-150" y="-160" width="300" height="20" rx="4" fill="#ffffff"/>
    <!-- Windows grid -->
    <g fill="#ffffff" opacity="0.9">
      <!-- Row 1 -->
      <rect x="-100" y="-115" width="40" height="40" rx="4"/>
      <rect x="-30" y="-115" width="40" height="40" rx="4"/>
      <rect x="40" y="-115" width="40" height="40" rx="4"/>
      <!-- Row 2 -->
      <rect x="-100" y="-50" width="40" height="40" rx="4"/>
      <rect x="-30" y="-50" width="40" height="40" rx="4"/>
      <rect x="40" y="-50" width="40" height="40" rx="4"/>
      <!-- Row 3 -->
      <rect x="-100" y="15" width="40" height="40" rx="4"/>
      <rect x="-30" y="15" width="40" height="40" rx="4"/>
      <rect x="40" y="15" width="40" height="40" rx="4"/>
    </g>
    <!-- Door -->
    <rect x="-30" y="80" width="60" height="50" rx="4" fill="#ffffff"/>
    <circle cx="20" cy="105" r="3" fill="#1e3a5f"/>
  </g>
</svg>
